services:
  - type: web
    name: flask-goals-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: flask-goals-db
          property: connectionString

databases:
  - name: flask-goals-db
    databaseName: goalsdb
    user: goalsuser
